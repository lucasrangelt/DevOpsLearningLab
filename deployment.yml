apiVersion: apps/v1
kind: Deployment
metadata:
  name: heartbeat-deployment
  namespace: "devops-project" # Must match the name defined in the main.tf file
spec:
  replicas: 3
  selector:
    matchLabels:
      app: heartbeat
  template:
    metadata:
      labels:
        app: heartbeat
    spec:
      containers:
      - name: heartbeat-app
        image: heartbeat:latest
        imagePullPolicy: Never # Crucial if you want to use the local image you just built
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: heartbeat-service
  namespace: "devops-project"
spec:
  type: NodePort # Exposes the service to your local machine
  selector:
    app: heartbeat
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30001 # You can access the service on localhost:30001